<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إضافة وظيفة</title>
    <link rel="stylesheet" href="wadifaa.css">
</head>
<body>
    <div class="container" style="max-width: 600px; margin-top: 50px;">
        <h2>إضافة وظيفة جديدة</h2>
        <form id="adminForm">
            <input type="text" id="title" placeholder="عنوان الوظيفة" required><br>
            <input type="text" id="company" placeholder="اسم الشركة/الجهة" required><br>
            <input type="text" id="city" placeholder="المدينة" required><br>
            
            <select id="type">
                <option value="gov">وظائف حكومية</option>
                <option value="private">وظائف خاصة</option>
                <option value="exams">نماذج مباريات</option>
                <option value="news">أخبار متنوعة</option>
            </select><br>

            <textarea id="description" placeholder="وصف الوظيفة" required></textarea><br>
            <button type="submit" class="btn-back">نشر الوظيفة</button>
        </form>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
