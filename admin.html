<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<body>
    <div class="container">
       

       
        <h3>إضافة وظيفة جديدة</h3>
<form id="addJobForm">
    <input type="text" id="jobTitle" placeholder="عنوان الوظيفة" required><br>
    <input type="text" id="jobCompany" placeholder="اسم الشركة" required><br>
    <input type="text" id="jobCompany" placeholder="اسم الشركة" required><br>
    <select id="jobType" required>
        <option value="gov">وظائف حكومية</option>
        <option value="private">وظائف خاصة</option>
        <option value="exams">نماذج مباريات</option>
    </select><br>

    <textarea id="jobDesc" placeholder="تفاصيل الوظيفة"></textarea><br>
    <button type="submit">نشر الوظيفة</button>
</form>

        <hr>

        <section>
            <h3>إضافة خبر جديد</h3>
            <form id="addNewsForm">
                <input type="text" id="newsText" placeholder="نص الخبر" required>
                <button type="submit">نشر الخبر</button>
            </form>
        </section>

        <div id="status" style="margin-top: 20px; font-weight: bold;"></div>
        <br>
        <a href="index.html">الرجوع للموقع الرئيسي</a>
    </div>
