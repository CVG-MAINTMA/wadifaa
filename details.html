<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الوظيفة - Wadifaa</title>
    <link rel="stylesheet" href="wadifaa.css">
</head>
<body>
    <div class="container" style="margin-top: 50px;">
        <div id="job-detail-content" class="job-card" style="padding: 40px;">
        </div>
        <a href="wadifaa.html" class="btn-apply" style="display:inline-block; margin-top:20px;">العودة للرئيسية</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jobId = params.get('id');

        fetch('wadifaa.json')
            .then(res => res.json())
            .then(data => {
                const job = data.find(j => j.id == jobId);
                if(job) {
                    document.getElementById('job-detail-content').innerHTML = `
                        <h1>${job.title}</h1>
                        <p style="color: #666;">المؤسسة: ${job.company}</p>
                        <hr>
                        <div style="font-size: 1.2rem; line-height: 1.8;">${job.desc}</div>
                        <p><strong>تاريخ النشر:</strong> ${job.date}</p>
                    `;
                }
            });
    </script>
</body>
</html>
