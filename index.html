<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wadifaa - بوابة التوظيف</title>
    <link rel="stylesheet" href="wadifaa.css">
</head>
<body>

    <header class="main-header">
        <h1>Wadifaa - الوظيفة</h1>
        <p>بوابتكم نحو عالم الشغل والمستقبل الرقمي</p>
    </header>

    <div id="news-bar" class="news-bar">
        <span class="news-label">📢 آخر الأخبار:</span>
        <span id="latestNews">جاري تحميل الأخبار...</span>
    </div>

    <section class="search-section container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن وظيفة...">
            <select id="citySelect">
                <option value="">كل المدن</option>
            </select>
            <button class="btn-search">بحث</button>
        </div>
    </section>

    <main class="main-content container">
        <section class="jobs-column">
            <h2 class="title-bg">أحدث مباريات التوظيف</h2>
            <div id="dynamic-jobs"></div>
        </section>
    </main>

    <script type="module" src="wadifaa.js"></script>
</body>
</html>
